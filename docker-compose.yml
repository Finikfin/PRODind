services:
  db:
    image: postgres:16-alpine
    container_name: lotty_db
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: lotty
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: lotty_redis
    restart: always
    ports:
      - "6379:6379"

  app:
    build:
      context: ./solution
      dockerfile: ../Dockerfile
    container_name: lotty_app
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - ./solution:/app
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=lotty
      - DB_USER=user
      - DB_PASSWORD=password
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=your_super_secret_key
      - ADMIN_EMAIL=admin@mail.ru
      - ADMIN_PASSWORD=admin123
    depends_on:
      - db
      - redis

volumes:
  postgres_data: